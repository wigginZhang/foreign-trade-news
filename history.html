<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史日报 - 外贸新闻档案</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #F4F3EE;
            --color-bg-secondary: #EDEBE6;
            --color-bg-tertiary: #E8E6E1;
            --color-accent: #C15F3C;
            --color-accent-hover: #A84E30;
            --color-text-primary: #2C2825;
            --color-text-secondary: #6B6560;
            --color-text-tertiary: #9A9590;
            --color-separator: #DDDBD6;
            --color-white: #FFFFFF;
            --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 20px;
            --space-xl: 32px;
            --space-2xl: 48px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 100px;
            --shadow-card: 0 2px 8px rgba(44,40,37,0.06);
            --shadow-elevated: 0 4px 16px rgba(44,40,37,0.10);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--color-bg);
            color: var(--color-text-primary);
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
        }
        header {
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-separator);
            padding: 0 var(--space-lg);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-title {
            font-family: var(--font-serif);
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .header-link {
            font-size: 14px;
            color: var(--color-accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-link:hover { color: var(--color-accent-hover); }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: var(--space-xl);
        }
        .page-title {
            font-family: var(--font-serif);
            font-size: 32px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: var(--space-sm);
        }
        .page-desc {
            font-size: 15px;
            color: var(--color-text-secondary);
            margin-bottom: var(--space-xl);
        }
        .stats-row {
            display: flex;
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
        }
        .stat-card {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            flex: 1;
            text-align: center;
            box-shadow: var(--shadow-card);
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-accent);
        }
        .stat-label {
            font-size: 12px;
            color: var(--color-text-secondary);
            margin-top: var(--space-xs);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .section-title {
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: var(--space-md);
            padding-bottom: var(--space-sm);
            border-bottom: 2px solid var(--color-accent);
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }
        .history-item {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            box-shadow: var(--shadow-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .history-item:hover {
            box-shadow: var(--shadow-elevated);
            transform: translateY(-2px);
        }
        .history-item-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .history-date {
            font-family: var(--font-serif);
            font-size: 17px;
            font-weight: 600;
            color: var(--color-text-primary);
        }
        .history-weekday {
            font-size: 13px;
            color: var(--color-text-secondary);
        }
        .history-item-right {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }
        .history-stats {
            font-size: 13px;
            color: var(--color-text-secondary);
            text-align: right;
        }
        .history-stats span {
            display: block;
        }
        .history-arrow {
            color: var(--color-accent);
            font-size: 20px;
        }
        .empty-state {
            text-align: center;
            padding: var(--space-2xl);
            color: var(--color-text-secondary);
        }
        .footer {
            text-align: center;
            font-size: 13px;
            color: var(--color-text-tertiary);
            padding: var(--space-xl);
            margin-top: var(--space-xl);
            border-top: 1px solid var(--color-separator);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">🐾 外贸新闻播报</div>
        <a href="index.html" class="header-link">
            ← 返回首页
        </a>
    </header>
    
    <div class="container">
        <h1 class="page-title">历史日报</h1>
        <p class="page-desc">外贸新闻档案库 · 每日自动采集更新</p>
        
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="totalDays">-</div>
                <div class="stat-label">累计天数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalNews">-</div>
                <div class="stat-label">累计新闻</div>
            </div>
        </div>
        
        <h2 class="section-title">📅 日报列表</h2>
        <div class="history-list" id="historyList">
            <!-- JS will populate this -->
        </div>
    </div>
    
    <div class="footer">
        外贸新闻播报 · 数据来源综合全网外贸资讯 · 
        <a href="https://github.com/wigginZhang/foreign-trade-news" style="color: var(--color-accent);">GitHub</a>
    </div>
    
    <script>
        // 日期到星期几的映射
        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekday = weekdays[date.getDay()];
            return { month, day, weekday, full: `${month}月${day}日` };
        }
        
        // 动态加载所有历史日报
        const dates = ['2026-04-10', '2026-04-11', '2026-04-13', '2026-04-14', '2026-04-15', '2026-04-16'];
        let totalNewsCount = 0;
        let loadedCount = 0;
        
        const historyList = document.getElementById('historyList');
        const totalDaysEl = document.getElementById('totalDays');
        const totalNewsEl = document.getElementById('totalNews');
        
        // 按日期倒序排列
        dates.reverse();
        
        dates.forEach(date => {
            const el = document.createElement('a');
            el.className = 'history-item';
            el.href = `daily/${date}.html`;
            
            const { month, day, weekday, full } = formatDate(date);
            
            el.innerHTML = `
                <div class="history-item-left">
                    <div class="history-date">${month}月${day}日 ${weekday !== '周六' && weekday !== '周日' ? '' : weekday}</div>
                    <div class="history-weekday">${weekday}</div>
                </div>
                <div class="history-item-right">
                    <div class="history-stats">
                        <span>加载中...</span>
                    </div>
                    <div class="history-arrow">→</div>
                </div>
            `;
            historyList.appendChild(el);
            
            // 异步加载统计数据
            fetch(`data/${date}.json`)
                .then(r => r.json())
                .then(data => {
                    const stats = data.stats || { totalNews: 0, sections: 0 };
                    totalNewsCount += stats.totalNews || 0;
                    el.querySelector('.history-stats span').textContent = 
                        `${stats.totalNews || 0} 条新闻 · ${stats.sections || 0} 个分类`;
                    totalNewsEl.textContent = totalNewsCount;
                })
                .catch(() => {
                    el.querySelector('.history-stats span').textContent = '数据加载失败';
                });
        });
        
        totalDaysEl.textContent = dates.length;
    </script>
</body>
</html>
