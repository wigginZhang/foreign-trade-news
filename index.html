<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外贸新闻档案</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════════════
           DESIGN TOKENS — Claude Style
           ═══════════════════════════════════════════════════════════ */
        :root {
            /* Colors — Warm Terracotta Palette */
            --color-bg: #F4F3EE;
            --color-bg-secondary: #EDEBE6;
            --color-bg-tertiary: #E8E6E1;
            --color-accent: #C15F3C;
            --color-accent-hover: #A84E30;
            --color-text-primary: #2C2825;
            --color-text-secondary: #6B6560;
            --color-text-tertiary: #9A9590;
            --color-separator: #DDDBD6;
            --color-white: #FFFFFF;
            --color-high-impact: #C15F3C;
            --color-medium-impact: #B8860B;
            --color-low-impact: #9A9590;

            /* Typography */
            --font-serif: 'Playfair Display', Georgia, 'Times New Roman', serif;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;

            /* Spacing (8px base) */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 20px;
            --space-xl: 32px;
            --space-2xl: 48px;

            /* Radius */
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 100px;

            /* Shadows — Warm Tone */
            --shadow-card: 0 2px 8px rgba(44,40,37,0.06);
            --shadow-elevated: 0 4px 16px rgba(44,40,37,0.10);
        }

        /* ═══════════════════════════════════════════════════════════
           RESET & BASE
           ═══════════════════════════════════════════════════════════ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: var(--color-bg);
            color: var(--color-text-primary);
            line-height: 1.65;
            height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══════════════════════════════════════════════════════════
           HEADER — Warm Ivory Style
           ═══════════════════════════════════════════════════════════ */
        header {
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-separator);
            padding: 0 var(--space-lg);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-title {
            font-family: var(--font-serif);
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--color-text-primary);
        }

        .header-sub {
            font-size: 13px;
            font-weight: 400;
            color: var(--color-text-secondary);
        }

        /* ═══════════════════════════════════════════════════════════
           LAYOUT
           ═══════════════════════════════════════════════════════════ */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════════════════════════
           SIDEBAR — Warm Gray
           ═══════════════════════════════════════════════════════════ */
        .sidebar {
            width: 240px;
            background: var(--color-bg-secondary);
            border-right: 1px solid var(--color-separator);
            overflow-y: auto;
            flex-shrink: 0;
            padding: var(--space-lg);
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: var(--space-md);
        }

        /* Date Picker Card */
        .date-picker {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            padding: var(--space-md);
            box-shadow: var(--shadow-card);
            margin-bottom: var(--space-lg);
        }

        .date-input-wrapper {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: 10px 12px;
            border: 1px solid var(--color-separator);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: border-color 0.2s;
            background: var(--color-bg);
        }

        .date-input-wrapper:hover {
            border-color: var(--color-accent);
        }

        .date-input-wrapper input[type="date"] {
            border: none;
            background: transparent;
            font-size: 14px;
            font-family: inherit;
            color: var(--color-text-primary);
            cursor: pointer;
            outline: none;
            flex: 1;
        }

        .date-input-wrapper input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.5;
            filter: sepia(0.3) hue-rotate(-10deg);
        }

        .date-display {
            font-size: 12px;
            color: var(--color-text-secondary);
            margin-top: var(--space-sm);
            padding: 0 4px;
        }

        /* Quick Date Buttons — Capsule Style */
        .quick-dates {
            margin-top: var(--space-md);
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-sm);
        }

        .quick-date-btn {
            font-size: 13px;
            font-weight: 500;
            padding: 8px 14px;
            border: none;
            border-radius: var(--radius-full);
            background: var(--color-bg);
            color: var(--color-text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-date-btn:hover {
            background: var(--color-accent);
            color: var(--color-white);
            transform: translateY(-1px);
        }

        /* ═══════════════════════════════════════════════════════════
           MAIN CONTENT
           ═══════════════════════════════════════════════════════════ */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-lg) var(--space-xl);
        }

        .main-inner {
            max-width: 680px;
            margin: 0 auto;
        }

        /* ═══════════════════════════════════════════════════════════
           STATS BAR — Warm Card Style
           ═══════════════════════════════════════════════════════════ */
        .stats-bar {
            display: flex;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }

        .stat {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            padding: var(--space-lg) var(--space-md);
            flex: 1;
            text-align: center;
            box-shadow: var(--shadow-card);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-accent);
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--color-text-secondary);
            margin-top: var(--space-xs);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ═══════════════════════════════════════════════════════════
           NEWS SECTION — Card Style
           ═══════════════════════════════════════════════════════════ */
        .section {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-md);
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        .section-header {
            padding: 14px var(--space-lg);
            background: var(--color-bg-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-family: var(--font-serif);
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .section-title .icon {
            margin-right: var(--space-sm);
        }

        .section-count {
            font-size: 12px;
            font-weight: 500;
            color: var(--color-text-secondary);
            background: var(--color-separator);
            padding: 4px 10px;
            border-radius: var(--radius-sm);
        }

        /* ═══════════════════════════════════════════════════════════
           NEWS ITEM
           ═══════════════════════════════════════════════════════════ */
        .news-item {
            padding: var(--space-lg);
            border-bottom: 1px solid var(--color-separator);
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-title {
            font-family: var(--font-serif);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: var(--space-sm);
            display: flex;
            gap: 8px;
            line-height: 1.4;
        }

        .news-num {
            color: var(--color-accent);
            font-weight: 700;
            flex-shrink: 0;
        }

        .news-meta {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: 10px;
            font-size: 13px;
            color: var(--color-text-secondary);
            flex-wrap: wrap;
            align-items: center;
        }

        /* Impact Tags — Terracotta Style */
        .impact-tag {
            padding: 3px 10px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .impact-tag.high {
            background: rgba(193, 95, 60, 0.12);
            color: var(--color-high-impact);
        }

        .impact-tag.medium {
            background: rgba(184, 134, 11, 0.12);
            color: var(--color-medium-impact);
        }

        .impact-tag.low {
            background: rgba(154, 149, 144, 0.12);
            color: var(--color-low-impact);
        }

        .news-snippet {
            font-size: 14px;
            color: var(--color-text-primary);
            line-height: 1.65;
            margin-bottom: 14px;
        }

        /* Key Facts — Left Border Style */
        .key-facts {
            background: var(--color-bg);
            border-left: 3px solid var(--color-accent);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            padding: 12px 14px;
            margin-bottom: 14px;
        }

        .key-facts-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--color-text-secondary);
            margin-bottom: var(--space-sm);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .key-facts ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .key-facts li {
            font-size: 13px;
            color: var(--color-text-primary);
            padding: 3px 0;
            padding-left: 14px;
            position: relative;
            line-height: 1.5;
        }

        .key-facts li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--color-accent);
            font-size: 12px;
        }

        /* News Link — Secondary Button Style */
        .news-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-accent);
            text-decoration: none;
            padding: 9px 18px;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--color-accent);
            background: var(--color-white);
            transition: all 0.2s;
        }

        .news-link:hover {
            background: var(--color-accent);
            color: var(--color-white);
            transform: translateY(-1px);
            text-decoration: none;
        }

        .news-link:active {
            transform: translateY(0);
        }

        /* ═══════════════════════════════════════════════════════════
           EMPTY & LOADING STATES
           ═══════════════════════════════════════════════════════════ */
        .empty, .loading {
            text-align: center;
            padding: var(--space-2xl) var(--space-lg);
            color: var(--color-text-secondary);
        }

        .empty-icon {
            font-size: 44px;
            margin-bottom: var(--space-md);
        }

        .empty p {
            font-family: var(--font-serif);
            font-size: 18px;
            margin-bottom: var(--space-sm);
            color: var(--color-text-primary);
        }

        .empty-hint {
            font-size: 13px;
            color: var(--color-text-tertiary);
        }

        /* ═══════════════════════════════════════════════════════════
           RESPONSIVE — Mobile
           ═══════════════════════════════════════════════════════════ */
        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--color-separator);
                padding: var(--space-md);
            }

            .date-picker {
                margin-bottom: var(--space-md);
            }

            .quick-dates {
                justify-content: flex-start;
            }

            .main {
                padding: var(--space-md);
            }

            .stats-bar {
                gap: var(--space-sm);
            }

            .stat {
                padding: var(--space-md) var(--space-sm);
            }

            .stat-value {
                font-size: 22px;
            }

            .news-item {
                padding: var(--space-md);
            }

            .news-title {
                font-size: 15px;
            }
        }

        /* History Section */
        .history-section {
            background: var(--color-white);
            border-radius: var(--radius-lg);
            margin-top: var(--space-xl);
            padding: 25px;
            box-shadow: var(--shadow-card);
        }

        .history-section h2 {
            font-family: var(--font-serif);
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text-primary);
            border-bottom: 1px solid var(--color-separator);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .history-list li {
            margin: 0;
        }

        .history-list a {
            display: inline-block;
            padding: 6px 14px;
            background: var(--color-bg);
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text-primary);
            text-decoration: none;
            transition: all 0.2s;
        }

        .history-list a:hover {
            background: var(--color-accent);
            color: var(--color-white);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">🐾 外贸新闻档案</div>
        <div class="header-sub" id="headerSub">选择日期查看播报</div>
    </header>

    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-title">📅 选择日期</div>
            
            <div class="date-picker">
                <div class="date-input-wrapper">
                    <span>📆</span>
                    <input type="date" id="dateInput" max="">
                </div>
                <div class="date-display" id="dateDisplay">请选择日期</div>
                
                <div class="quick-dates">
                    <button class="quick-date-btn" onclick="loadToday()">今天</button>
                    <button class="quick-date-btn" onclick="loadYesterday()">昨天</button>
                    <button class="quick-date-btn" onclick="loadDaysAgo(2)">前天</button>
                    <button class="quick-date-btn" onclick="loadDaysAgo(7)">7天前</button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main" id="mainContent">
            <div class="main-inner">
                <div class="empty">
                    <div class="empty-icon">📅</div>
                    <p>请选择日期查看新闻播报</p>
                    <p class="empty-hint">定时任务每天 09:20 自动生成</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const ARCHIVE_BASE = './data/';

        const CAT = {
            tariff:    { icon: '📦', label: '关税与贸易政策' },
            data:      { icon: '📊', label: '进出口数据' },
            geo:       { icon: '🌍', label: '地缘政治动态' },
            fx:        { icon: '💱', label: '人民币汇率' },
            logistics: { icon: '🛃', label: '物流与港口' }
        };

        const CAT_ORDER = ['tariff', 'data', 'geo', 'fx', 'logistics'];

        const WEEKDAYS = ['周日','周一','周二','周三','周四','周五','周六'];

        let currentDate = null;

        function init() {
            const today = formatDate(new Date());
            document.getElementById('dateInput').max = today;
            
            document.getElementById('dateInput').addEventListener('change', (e) => {
                if (e.target.value) {
                    loadDate(e.target.value);
                }
            });
            
            loadToday();
        }

        function formatDate(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth()+1).padStart(2,'0');
            const day = String(d.getDate()).padStart(2,'0');
            return `${y}-${m}-${day}`;
        }

        function friendlyDate(ds) {
            const d = new Date(ds);
            const m = d.getMonth()+1;
            const day = d.getDate();
            const wd = WEEKDAYS[d.getDay()];
            return { main: `${m}月${day}日`, sub: wd };
        }

        function loadToday() {
            const today = formatDate(new Date());
            document.getElementById('dateInput').value = today;
            loadDate(today);
        }

        function loadYesterday() {
            const d = new Date();
            d.setDate(d.getDate() - 1);
            const ds = formatDate(d);
            document.getElementById('dateInput').value = ds;
            loadDate(ds);
        }

        function loadDaysAgo(n) {
            const d = new Date();
            d.setDate(d.getDate() - n);
            const ds = formatDate(d);
            document.getElementById('dateInput').value = ds;
            loadDate(ds);
        }

        async function loadDate(ds) {
            currentDate = ds;
            const { main, sub } = friendlyDate(ds);
            document.getElementById('dateDisplay').textContent = `${ds}（${sub}）`;
            document.getElementById('mainContent').innerHTML = `
                <div class="main-inner">
                    <div class="loading">
                        <div class="empty-icon">⏳</div>
                        <p>加载中...</p>
                    </div>
                </div>`;

            try {
                const r = await fetch(ARCHIVE_BASE + ds + '.json');
                if (!r.ok) {
                    document.getElementById('mainContent').innerHTML = `
                        <div class="main-inner">
                            <div class="empty">
                                <div class="empty-icon">📭</div>
                                <p>暂无 ${ds} 的播报数据</p>
                                <p class="empty-hint">定时任务每天 09:20 自动生成</p>
                            </div>
                        </div>`;
                    document.getElementById('headerSub').textContent = `${ds} · 暂无数据`;
                    return;
                }
                const data = await r.json();
                renderContent(data);
            } catch(e) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="main-inner">
                        <div class="empty">
                            <div class="empty-icon">⚠️</div>
                            <p>数据加载失败</p>
                            <p class="empty-hint">请检查网络连接</p>
                        </div>
                    </div>`;
                document.getElementById('headerSub').textContent = '加载失败';
            }
        }

        function renderContent(data) {
            const d = new Date(data.dateShort);
            const m = d.getMonth()+1;
            const day = d.getDate();
            const wd = WEEKDAYS[d.getDay()];

            document.getElementById('headerSub').textContent =
                `${data.dateShort.slice(0,4)}年${m}月${day}日（${wd}）· ${data.generatedAt} 生成`;

            const allNews = (data.sections || []).flatMap(s => s.news || []);
            const highCount = allNews.filter(n => n.impact === 'high').length;

            let html = `
                <div class="main-inner">
                    <div class="stats-bar">
                        <div class="stat">
                            <div class="stat-value">${allNews.length}</div>
                            <div class="stat-label">新闻总数</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${(data.sections||[]).length}</div>
                            <div class="stat-label">板块数</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${highCount}</div>
                            <div class="stat-label">高影响</div>
                        </div>
                    </div>
            `;

            const sections = data.sections || [];
            sections.sort((a,b) => {
                const ai = CAT_ORDER.indexOf(a.id);
                const bi = CAT_ORDER.indexOf(b.id);
                return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
            });

            for (const sec of sections) {
                const cat = CAT[sec.id] || { icon: '📌', label: sec.title || sec.id };
                const news = sec.news || [];
                html += `
                    <div class="section">
                        <div class="section-header">
                            <div class="section-title"><span class="icon">${cat.icon}</span>${cat.label}</div>
                            <div class="section-count">${news.length} 条</div>
                        </div>
                        <div>
                            ${news.map((item, i) => renderNewsItem(item, i+1)).join('')}
                        </div>
                    </div>
                `;
            }

            if (sections.length === 0) {
                html += `
                    <div class="empty">
                        <div class="empty-icon">📭</div>
                        <p>暂无内容</p>
                    </div>
                `;
            }

            html += '</div>';
            document.getElementById('mainContent').innerHTML = html;
        }

        function renderNewsItem(item, num) {
            const impactLabel = item.impact === 'high' ? '⚠️ 高影响' : '📊 中影响';
            const keyFacts = (item.keyFacts && item.keyFacts.length > 0)
                ? `<div class="key-facts">
                    <div class="key-facts-title">关键事实</div>
                    <ul>${item.keyFacts.map(f => `<li>${esc(f)}</li>`).join('')}</ul>
                   </div>`
                : '';
            const link = item.url
                ? `<a href="${esc(item.url)}" target="_blank" class="news-link">🔗 阅读原文</a>`
                : '';

            return `
                <div class="news-item">
                    <div class="news-title">
                        <span class="news-num">${num}.</span>
                        <span>${esc(item.title)}</span>
                    </div>
                    <div class="news-meta">
                        <span>📍 ${esc(item.source || '')}</span>
                        <span class="impact-tag ${item.impact || 'medium'}">${impactLabel}</span>
                    </div>
                    <div class="news-snippet">${esc(item.snippet || '')}</div>
                    ${keyFacts}
                    ${link}
                </div>
            `;
        }

        function esc(text) {
            if (!text) return '';
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        init();

        // Load history archive list
        async function loadHistory() {
            const el = document.getElementById('historyList');
            if (!el) return;
            try {
                // Fetch all available dates from data/ directory
                // We probe for each date from today going back
                const today = new Date();
                const dates = [];
                for (let i = 0; i < 60; i++) {
                    const d = new Date(today);
                    d.setDate(d.getDate() - i);
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    const ds = `${y}-${m}-${day}`;
                    const r = await fetch('./data/' + ds + '.json');
                    if (r.ok) dates.push(ds);
                }
                if (dates.length === 0) {
                    el.innerHTML = '<li><span style="font-size:13px;color:var(--color-text-tertiary)">暂无历史数据</span></li>';
                    return;
                }
                el.innerHTML = dates.map(ds => {
                    const d = new Date(ds);
                    const wd = ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
                    return `<li><a href="./daily/${ds}.html">${ds}（${wd}）</a></li>`;
                }).join('');
            } catch(e) {
                el.innerHTML = '<li><span style="font-size:13px;color:var(--color-text-tertiary)">加载失败</span></li>';
            }
        }
        loadHistory();
    </script>

    <!-- History Archive -->
    <div class="history-section">
        <h2>📅 历史日报目录</h2>
        <ul class="history-list" id="historyList">
            <li><span style="font-size:13px;color:var(--color-text-tertiary)">加载中...</span></li>
        </ul>
    </div>
</body>
</html>
